services:
  # 🧠 El Cerebro: Backend con CrewAI y FastAPI
  - type: web
    name: travel-planner-backend
    env: docker
    dockerContext: travel_crew_backend
    dockerfilePath: travel_crew_backend/Dockerfile
    plan: free
    region: ohio
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: MODEL
        value: gemini-2.5-flash-lite
      - key: PORT
        value: 10000
      - key: PYTHONPATH
        value: /app/src

  # 🎨 La Cara: Frontend con Streamlit
  - type: web
    name: travel-planner-frontend
    env: docker
    dockerContext: Front-End-Proyecto-Chatbot-de-Viajes
    dockerfilePath: Front-End-Proyecto-Chatbot-de-Viajes/Dockerfile
    plan: free
    region: ohio
    envVars:
      - key: BACKEND_URL
        value: http://travel-planner-backend:10000/plan-trip
